<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escucha — Transcriptor de video</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
  header p { color: #94a3b8; margin-top: 0.4rem; font-size: 0.9rem; }

  .warnings { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .warning {
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-size: 0.875rem;
    border-left: 4px solid;
  }
  .warning.error   { background: #1e0a0a; border-color: #ef4444; color: #fca5a5; }
  .warning.caution { background: #1a1200; border-color: #f59e0b; color: #fcd34d; }
  .warning.info    { background: #0a1020; border-color: #3b82f6; color: #93c5fd; }

  .card {
    background: #1e2130;
    border: 1px solid #2d3348;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  #drop-zone {
    border: 2px dashed #3d4460;
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: #6366f1;
    background: #1a1c2e;
  }
  #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  #drop-zone p { color: #94a3b8; font-size: 0.9rem; }
  #drop-zone .file-info {
    margin-top: 0.75rem;
    font-weight: 600;
    color: #a5b4fc;
    font-size: 0.875rem;
  }
  #file-error { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; }
  #file-input { display: none; }

  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
    margin-top: 1.25rem;
  }
  .opt-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .opt-group label { font-size: 0.8rem; color: #94a3b8; }
  select {
    background: #252840;
    border: 1px solid #3d4460;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 0.45rem 0.75rem;
    font-size: 0.875rem;
    cursor: pointer;
  }
  .checkboxes { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    cursor: pointer;
    color: #cbd5e1;
  }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #6366f1; }

  #start-btn {
    display: block;
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.85rem;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  #start-btn:hover:not(:disabled) { background: #4f46e5; }
  #start-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  #progress-section { display: none; }
  .progress-bar-wrap {
    background: #252840;
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 0.75rem;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  #progress-label { font-size: 0.875rem; color: #94a3b8; }
  #error-banner {
    display: none;
    background: #1e0a0a;
    border: 1px solid #ef4444;
    color: #fca5a5;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.875rem;
    margin-top: 1rem;
  }

  #results-section { display: none; }

  details { margin-bottom: 1rem; }
  summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    user-select: none;
    padding: 0.4rem 0;
    list-style: none;
  }
  summary::before { content: "▸ "; }
  details[open] summary::before { content: "▾ "; }
  #summary-text {
    margin-top: 0.75rem;
    line-height: 1.7;
    color: #cbd5e1;
    white-space: pre-wrap;
    font-size: 0.9rem;
  }

  h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }

  #transcript-box {
    max-height: 420px;
    overflow-y: auto;
    background: #12141f;
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.85rem;
    line-height: 1.75;
  }
  .seg-row { display: flex; gap: 0.75rem; align-items: baseline; margin-bottom: 0.35rem; }
  .seg-ts { color: #64748b; font-family: monospace; flex-shrink: 0; font-size: 0.8rem; }
  .seg-speaker { font-weight: 600; flex-shrink: 0; min-width: 90px; }
  .seg-text { color: #cbd5e1; }

  .export-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .export-btn {
    padding: 0.55rem 1.1rem;
    background: #252840;
    border: 1px solid #3d4460;
    color: #e2e8f0;
    border-radius: 7px;
    text-decoration: none;
    font-size: 0.85rem;
    transition: background 0.15s;
  }
  .export-btn:hover { background: #2d3252; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Escucha</h1>
    <p>Transcriptor de reuniones con identificacion de hablantes</p>
  </header>

  <div id="warnings-area" class="warnings"></div>

  <div class="card">
    <div id="drop-zone">
      <div class="icon">📂</div>
      <p>Arrastra un archivo MP4 aqui, o haz clic para seleccionar</p>
      <div class="file-info" id="file-info" style="display:none"></div>
      <div id="file-error"></div>
      <input type="file" id="file-input" accept=".mp4,video/mp4">
    </div>

    <div class="options-row">
      <div class="opt-group">
        <label for="speakers-select">Hablantes</label>
        <select id="speakers-select">
          <option value="">auto</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <div class="opt-group">
        <label for="lang-select">Idioma</label>
        <select id="lang-select">
          <option value="es" selected>Espanol</option>
          <option value="en">English</option>
          <option value="auto">Auto</option>
        </select>
      </div>
      <div class="checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" id="summarize-check" checked>
          Generar resumen
        </label>
        <label class="checkbox-label" id="claude-row" style="display:none">
          <input type="checkbox" id="claude-check">
          Usar Claude (requiere API key)
        </label>
      </div>
    </div>

    <button id="start-btn" disabled>&#9654; Iniciar Transcripcion</button>
  </div>

  <div class="card" id="progress-section">
    <div class="progress-bar-wrap">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-label">Preparando... <span id="progress-pct">0%</span></div>
    <div id="error-banner"></div>
  </div>

  <div class="card" id="results-section">
    <details open>
      <summary>Resumen</summary>
      <div id="summary-text"></div>
    </details>

    <h3>Transcripcion</h3>
    <div id="transcript-box"></div>

    <div class="export-row">
      <a id="export-txt" class="export-btn" download>&#128196; Descargar TXT</a>
      <a id="export-srt" class="export-btn" download>&#128196; Descargar SRT</a>
    </div>
  </div>

</div>
<script>
const SPEAKER_COLORS = ["#4A90D9","#D94A4A","#4AD97A","#D9A84A","#9B4AD9","#4AD9D9"];
const STEP_LABELS = {
  extracting_audio: "Extrayendo audio...",
  transcribing: "Transcribiendo...",
  diarizing: "Identificando hablantes...",
  merging: "Alineando transcripcion...",
  summarizing: "Generando resumen...",
  done: "Listo",
};

let selectedFile = null;
let currentJobId = null;
let pollInterval = null;

const dropZone      = document.getElementById("drop-zone");
const fileInput     = document.getElementById("file-input");
const fileInfo      = document.getElementById("file-info");
const fileError     = document.getElementById("file-error");
const startBtn      = document.getElementById("start-btn");
const progressSec   = document.getElementById("progress-section");
const progressFill  = document.getElementById("progress-fill");
const progressLabel = document.getElementById("progress-label");
const progressPct   = document.getElementById("progress-pct");
const errorBanner   = document.getElementById("error-banner");
const resultsSec    = document.getElementById("results-section");
const summaryText   = document.getElementById("summary-text");
const transcriptBox = document.getElementById("transcript-box");
const exportTxt     = document.getElementById("export-txt");
const exportSrt     = document.getElementById("export-srt");
const warningsArea  = document.getElementById("warnings-area");
const claudeRow     = document.getElementById("claude-row");

async function checkHealth() {
  try {
    const r = await fetch("/api/health");
    const h = await r.json();
    const warns = [];
    if (!h.ffmpeg)       warns.push({cls:"error",   msg:"FFmpeg no encontrado. Consulta las instrucciones de instalacion."});
    if (!h.hf_token_set) warns.push({cls:"error",   msg:"Token de HuggingFace no configurado. La identificacion de hablantes no funcionara."});
    if (!h.ollama)       warns.push({cls:"caution",  msg:"Ollama no detectado. El resumen se omitira (a menos que uses la API de Claude)."});
    if (!h.cuda)         warns.push({cls:"info",     msg:"Sin GPU detectada. El procesamiento sera mas lento."});
    warns.forEach(({cls, msg}) => {
      const d = document.createElement("div");
      d.className = "warning " + cls;
      d.textContent = msg;
      warningsArea.appendChild(d);
    });
    if (h.anthropic_key_set) claudeRow.style.display = "";
  } catch(e) {
    const d = document.createElement("div");
    d.className = "warning error";
    d.textContent = "No se puede conectar al servidor. Asegurate de que este en ejecucion.";
    warningsArea.appendChild(d);
  }
}
checkHealth();

function handleFile(file) {
  fileError.textContent = "";
  if (!file.name.toLowerCase().endsWith(".mp4")) {
    fileError.textContent = "Solo se aceptan archivos MP4.";
    selectedFile = null;
    startBtn.disabled = true;
    return;
  }
  if (file.size > 2 * 1024 * 1024 * 1024) {
    fileError.textContent = "El archivo excede el limite de 2 GB.";
    selectedFile = null;
    startBtn.disabled = true;
    return;
  }
  selectedFile = file;
  fileInfo.style.display = "";
  fileInfo.textContent = file.name + " (" + (file.size / 1024 / 1024).toFixed(1) + " MB)";
  startBtn.disabled = false;
}

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function updateProgress(pct, step, detail) {
  progressFill.style.width = pct + "%";
  const stepLabel = STEP_LABELS[step] || step;
  const detailStr = detail ? " — " + detail : "";
  progressLabel.innerHTML = stepLabel + detailStr + ' <span id="progress-pct">' + Math.round(pct) + '%</span>';
}

function showError(msg) {
  errorBanner.style.display = "";
  errorBanner.textContent = "Error: " + msg;
}

function startPolling(jobId) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const r = await fetch("/api/jobs/" + jobId);
      const j = await r.json();
      updateProgress(j.progress, j.current_step, j.step_detail);
      if (j.status === "completed") {
        clearInterval(pollInterval);
        await loadResults(jobId);
      } else if (j.status === "failed") {
        clearInterval(pollInterval);
        showError(j.error || "Error desconocido");
        startBtn.disabled = false;
        startBtn.textContent = "▶ Iniciar Transcripcion";
      }
    } catch(e) { /* keep polling */ }
  }, 3000);
}

function connectWebSocket(jobId) {
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(protocol + "//" + location.host + "/api/jobs/" + jobId + "/ws");
  let wsConnected = false;

  ws.onopen = () => { wsConnected = true; };

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "progress") {
      updateProgress(msg.progress, msg.current_step, msg.step_detail);
    } else if (msg.type === "completed") {
      updateProgress(100, "done", "");
      await loadResults(jobId);
    } else if (msg.type === "error") {
      showError(msg.message);
      startBtn.disabled = false;
      startBtn.textContent = "▶ Iniciar Transcripcion";
    }
  };

  ws.onclose = () => {
    // Always fall back to polling if results haven't appeared yet,
    // whether the WS never connected or disconnected mid-job.
    if (resultsSec.style.display === "none") {
      const lostMsg = document.createElement("div");
      lostMsg.className = "warning caution";
      lostMsg.style.marginTop = "0.75rem";
      lostMsg.textContent = wsConnected
        ? "Conexion perdida. Reconectando via sondeo..."
        : "No se pudo abrir WebSocket. Usando sondeo...";
      progressSec.appendChild(lostMsg);
      startPolling(jobId);
    }
  };

  ws.onerror = () => ws.close();
}

async function loadResults(jobId) {
  const r = await fetch("/api/jobs/" + jobId + "/result");
  const data = await r.json();

  summaryText.textContent = data.summary || "(sin resumen)";

  const speakerColorMap = {};
  (data.speakers || []).forEach((sp, i) => {
    speakerColorMap[sp] = SPEAKER_COLORS[i % SPEAKER_COLORS.length];
  });

  transcriptBox.innerHTML = "";
  if (!data.segments || data.segments.length === 0) {
    const notice = document.createElement("p");
    notice.style.cssText = "color:#94a3b8;font-style:italic;padding:0.5rem 0";
    notice.textContent = "No se detectaron segmentos de voz. Prueba cambiando el idioma a 'Auto' o usa un archivo con habla mas clara.";
    transcriptBox.appendChild(notice);
  }
  (data.segments || []).forEach(seg => {
    const h = Math.floor(seg.start / 3600);
    const m = Math.floor((seg.start % 3600) / 60);
    const s = Math.floor(seg.start % 60);
    const ts = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    const color = speakerColorMap[seg.speaker] || "#94a3b8";
    const row = document.createElement("div");
    row.className = "seg-row";
    row.innerHTML =
      '<span class="seg-ts">' + ts + '</span>' +
      '<span class="seg-speaker" style="color:' + color + '">' + seg.speaker + '</span>' +
      '<span class="seg-text">' + escapeHtml(seg.text) + '</span>';
    transcriptBox.appendChild(row);
  });

  exportTxt.href = "/api/jobs/" + jobId + "/export/txt";
  exportSrt.href = "/api/jobs/" + jobId + "/export/srt";

  resultsSec.style.display = "";
  startBtn.disabled = false;
  startBtn.textContent = "▶ Nueva Transcripcion";
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

startBtn.addEventListener("click", async () => {
  if (!selectedFile) return;

  resultsSec.style.display = "none";
  errorBanner.style.display = "none";
  transcriptBox.innerHTML = "";
  summaryText.textContent = "";
  progressSec.style.display = "";
  updateProgress(0, "extracting_audio", "");
  startBtn.disabled = true;
  startBtn.textContent = "Procesando...";

  const form = new FormData();
  form.append("file", selectedFile);
  const speakersVal = document.getElementById("speakers-select").value;
  if (speakersVal) form.append("num_speakers", speakersVal);
  form.append("language", document.getElementById("lang-select").value);
  form.append("summarize", document.getElementById("summarize-check").checked ? "true" : "false");
  form.append("use_claude", document.getElementById("claude-check").checked ? "true" : "false");

  try {
    const r = await fetch("/api/jobs", { method: "POST", body: form });
    if (!r.ok) {
      const err = await r.json();
      fileError.textContent = err.detail || ("Error " + r.status);
      startBtn.disabled = false;
      startBtn.textContent = "▶ Iniciar Transcripcion";
      progressSec.style.display = "none";
      return;
    }
    const { job_id } = await r.json();
    currentJobId = job_id;
    connectWebSocket(job_id);
  } catch(e) {
    fileError.textContent = "No se pudo conectar al servidor.";
    startBtn.disabled = false;
    startBtn.textContent = "▶ Iniciar Transcripcion";
    progressSec.style.display = "none";
  }
});
</script>
</body>
</html>
